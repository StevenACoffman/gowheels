name: Tests

on:
  workflow_call:

env:
  GOPRIVATE: "github.com/StevenACoffman"
  GOFLAGS: "-trimpath"

jobs:
  test:
    name: "Go Build/Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
          cache-dependency-path: "**/*.sum"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...
